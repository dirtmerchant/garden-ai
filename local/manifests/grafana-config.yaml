apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: garden
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Garden Postgres
        type: postgres
        url: postgres.garden.svc.cluster.local:5432
        database: garden
        user: postgres
        secureJsonData:
          password: $POSTGRES_PASSWORD
        jsonData:
          sslmode: disable
          postgresVersion: 1600
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: garden
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: garden
data:
  plant-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineWidth": 2,
                "pointSize": 5,
                "spanNulls": true,
                "thresholdsStyle": { "mode": "off" }
              },
              "decimals": 3,
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 10, "w": 18, "x": 0, "y": 0 },
          "id": 1,
          "title": "Green Pixel Ratio Over Time",
          "type": "timeseries",
          "targets": [
            {
              "rawSql": "SELECT capture_time AS time, green_pixel_ratio FROM plant_metrics ORDER BY capture_time",
              "format": "time_series",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": {
              "decimals": 3,
              "max": 1,
              "min": 0,
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.2 },
                  { "color": "green", "value": 0.4 }
                ]
              }
            }
          },
          "gridPos": { "h": 10, "w": 6, "x": 18, "y": 0 },
          "id": 2,
          "title": "Latest Reading",
          "type": "gauge",
          "targets": [
            {
              "rawSql": "SELECT green_pixel_ratio FROM plant_metrics ORDER BY capture_time DESC LIMIT 1",
              "format": "table",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "bars",
                "fillOpacity": 50,
                "lineWidth": 1
              },
              "decimals": 3,
              "max": 1,
              "min": 0,
              "unit": "percentunit"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 10 },
          "id": 3,
          "title": "Daily Average Green Ratio",
          "type": "timeseries",
          "targets": [
            {
              "rawSql": "SELECT date_trunc('day', capture_time) AS time, avg(green_pixel_ratio) AS avg_ratio FROM plant_metrics GROUP BY 1 ORDER BY 1",
              "format": "time_series",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 18 },
          "id": 4,
          "title": "Total Captures",
          "type": "stat",
          "targets": [
            {
              "rawSql": "SELECT count(*) AS total FROM plant_metrics",
              "format": "table",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 18 },
          "id": 5,
          "title": "Synced to GCS",
          "type": "stat",
          "targets": [
            {
              "rawSql": "SELECT count(*) AS synced FROM plant_metrics WHERE synced_to_gcs = true",
              "format": "table",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "postgres", "uid": "${DS_GARDEN_POSTGRES}" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 18 },
          "id": 6,
          "title": "Captures Today",
          "type": "stat",
          "targets": [
            {
              "rawSql": "SELECT count(*) AS today FROM plant_metrics WHERE capture_time >= current_date",
              "format": "table",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 2,
            "name": "DS_GARDEN_POSTGRES",
            "type": "datasource",
            "query": "postgres"
          }
        ]
      },
      "time": { "from": "now-7d", "to": "now" },
      "title": "Plant Health Monitor",
      "uid": "garden-plant-health"
    }
