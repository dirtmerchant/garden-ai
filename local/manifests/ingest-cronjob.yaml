apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: landing-zone
  namespace: garden
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: landing-zone-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest
  namespace: garden
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 240
      template:
        metadata:
          labels:
            app: ingest
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            - name: mc
              image: minio/mc:RELEASE.2025-05-21T01-59-54Z
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-user
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: root-password
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mc alias set local http://minio.garden.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

                  # Mirror landing zone into MinIO, preserving the YYYY/MM/DD/HHMMSS.jpg key structure.
                  # --remove copies then deletes source files (landing zone is transient).
                  # --overwrite avoids errors if a key somehow already exists.
                  mc mirror --remove --overwrite /landing/ local/garden-images/ 2>&1 || true

                  # Count for logging; exit 0 even if empty.
                  echo "ingest complete"
              volumeMounts:
                - name: landing
                  mountPath: /landing
                  readOnly: false
          volumes:
            - name: landing
              persistentVolumeClaim:
                claimName: landing-zone
