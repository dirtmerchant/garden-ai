apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio
  namespace: garden
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: minio
  endpoints:
    - port: api
      path: /minio/v2/metrics/cluster
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: analyzer
  namespace: garden
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: analyzer
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
