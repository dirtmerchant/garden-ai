name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check local/analyzer/ pi/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check local/analyzer/ pi/

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local/analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: local/analyzer/requirements.txt
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -v

  terraform:
    name: Terraform (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [cloud/terraform, local/terraform]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform init -backend=false
      - run: terraform validate

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: local/analyzer
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
